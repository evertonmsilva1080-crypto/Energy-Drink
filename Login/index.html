<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../img/Framboesa-refrigerante.png" type="image/x-icon">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Login Energy</title>
</head>
<body>
    <nav class="navbar">
        <a class="btn-link" href="../LandingPage/index.html"> < </a>
    </nav>
    <main class="container">
        <form>
            <h1>Login Level Up Energy</h1>
            <div class="input-box">
                <input placeholder="Usuário" type="email">
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>
        </form>
            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembram minha senha
                </label>
                <a href="#">Esqueci minha senha</a>
            </div>
            <button type="submit" class="login">Login</button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="">Cadastre-se</a></p>
            </div>
    </main>
    <script src="scripts.js"></script>
</body>
</html>
