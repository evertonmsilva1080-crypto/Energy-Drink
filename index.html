<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./img/Morango-refrigerante.png" type="image/x-icon">
    <title>Energy Drink</title>
</head>
<body>
    <main>
        <div class="item active" style="--backgroud: #ea3041">
            <div class="title">Morango</div>
            <img src="./img/Morango-refrigerante-foregroundBlur.png" class="fruit">
            <img src="./img/Morango-refrigerante.png" class="refri">
        </div>

        <div class="item" style="--backgroud: #e7a043">
            <div class="title">Laranja</div>
            <img src="./img/Laranja-refrigerante-foregroundBlur.png" class="fruit">
            <img src="./img/Laranja-refrigerante.png" class="refri">
        </div>

        <div class="item" style="--backgroud: #2d5643">
            <div class="title">Maçã Verde</div>
            <img src="./img/Maçã-Verde-refrigerante-foregroundBlur.png" class="fruit">
            <img src="./img/Maçã-Verde-refrigerante.png" class="refri">
        </div>

        <div class="item" style="--backgroud: #4169E1">
            <div class="title">Framboesa</div>
            <img src="./img/Framboesa-refrigerante-foregroudBlur.png" class="fruit">
            <img src="./img/Framboesa-refrigerante.png" class="refri">
        </div>

        <div class="arrow">
            <button id="prev"> < </button>
            <button id="next"> > </button>
        </div>
    </main>
    <script src="./scripts.js"></script>
</body>
</html>
